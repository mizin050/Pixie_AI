<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixie AI Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Outfit", sans-serif;
        background: linear-gradient(
          135deg,
          rgba(255, 180, 120, 0.9) 0%,
          rgba(255, 140, 140, 0.9) 25%,
          rgba(255, 190, 150, 0.9) 50%,
          rgba(255, 170, 100, 0.9) 75%,
          rgba(255, 145, 100, 0.9) 100%
        );
        min-height: 100vh;
        display: flex;
        overflow: hidden;
      }
      .main-container {
        display: flex;
        width: 100%;
        height: 100vh;
        position: relative;
        z-index: 1;
      }
      .image-side {
        flex: 1;
        display: flex;
        flex-direction: row;
        padding: 40px;
        max-width: calc(100% - 700px);
        position: relative;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
      }
      .fox-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        -webkit-app-region: drag;
      }
      #fox-canvas {
        width: 100%;
        height: 100%;
        display: block;
        -webkit-app-region: drag;
      }
      .chat-side {
        width: 660px;
        padding: 0.37cm 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: no-drag;
      }
      .chat-container {
        width: 100%;
        height: calc(100vh - 0.74cm);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(40px) saturate(180%);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 8px 32px rgba(255, 107, 53, 0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        -webkit-app-region: no-drag;
      }
      .chat-header {
        padding: 14px 16px 12px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(255, 255, 255, 0.05) 100%
        );
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        gap: 16px;
        -webkit-app-region: no-drag;
      }
      .chat-title {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: white;
        flex: 1;
        letter-spacing: 0.5px;
      }
      .mode-toggle {
        padding: 6px 14px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: white;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .mode-toggle:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .clear-btn {
        padding: 6px 14px;
        background: rgba(255, 107, 53, 0.2);
        border: 1px solid rgba(255, 107, 53, 0.3);
        border-radius: 10px;
        color: white;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .clear-btn:hover {
        background: rgba(255, 107, 53, 0.3);
      }
      .mode-toggle,
      .clear-btn,
      .copy-msg-btn {
        -webkit-app-region: no-drag;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 122, 61, 0.85) rgba(255, 255, 255, 0.14);
        user-select: text;
        -webkit-user-select: text;
        -webkit-app-region: no-drag;
      }
      .chat-messages::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      .chat-messages::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #ff874f 0%, #ff6b35 100%);
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.14);
      }
      .chat-messages::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #ff9963 0%, #ff7b45 100%);
      }
      .chat-messages::-webkit-scrollbar-corner {
        background: rgba(255, 255, 255, 0.14);
      }
      .message {
        display: flex;
        flex-direction: column;
        max-width: 80%;
      }
      .message.user {
        align-self: flex-end;
        align-items: flex-end;
      }
      .message.assistant {
        align-self: flex-start;
        align-items: flex-start;
      }
      .message-bubble {
        padding: 12px 16px;
        border-radius: 16px;
        word-wrap: break-word;
        position: relative;
      }
      .message-text {
        white-space: pre-wrap;
        line-height: 1.35;
        font-size: 14px;
      }
      .md-p {
        margin: 4px 0;
      }
      .md-gap {
        height: 8px;
      }
      .md-heading {
        font-weight: 700;
        margin: 6px 0 4px;
      }
      .md-h1 {
        font-size: 1.02rem;
      }
      .md-h2 {
        font-size: 0.98rem;
      }
      .md-h3 {
        font-size: 0.95rem;
      }
      .md-bullet,
      .md-numbered {
        margin: 2px 0;
      }
      .md-inline-code {
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.92em;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        padding: 1px 6px;
      }
      .md-code-wrap {
        margin: 10px 0;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(8, 10, 16, 0.92);
      }
      .md-code-head {
        padding: 8px 12px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-family: Consolas, "Courier New", monospace;
      }
      .md-code {
        margin: 0;
        padding: 12px;
        overflow-x: auto;
      }
      .md-code code {
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
        color: #e9f1ff;
        white-space: pre;
        display: block;
      }
      .md-sep {
        border-top: 1px solid rgba(255, 255, 255, 0.35);
        margin: 8px 0;
      }
      .message.user .message-bubble {
        background: linear-gradient(135deg, #ff6b35 0%, #f97316 100%);
        color: white;
        border-bottom-right-radius: 4px;
      }
      .message.assistant .message-bubble {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        color: white;
        border-bottom-left-radius: 4px;
      }
      .message-time {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 4px;
      }
      .copy-msg-btn {
        position: absolute;
        right: 10px;
        top: 8px;
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.18);
        color: rgba(255, 255, 255, 0.9);
        cursor: pointer;
      }
      .copy-msg-btn:hover {
        background: rgba(0, 0, 0, 0.32);
      }
      .copy-msg-btn svg {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .copy-msg-btn.copied {
        color: #bbffce;
      }
      .chat-input-container {
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        -webkit-app-region: no-drag;
      }
      .input-wrapper {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .chat-input {
        flex: 1;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        color: white;
        font-size: 15px;
        font-family: "Outfit", sans-serif;
        outline: none;
        -webkit-app-region: no-drag;
      }
      .chat-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .chat-input,
      .chat-title,
      .message-text,
      .md-code code {
        user-select: text;
        -webkit-user-select: text;
      }
      .send-btn {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #ff6b35 0%, #f97316 100%);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
        -webkit-app-region: no-drag;
      }
      .send-btn:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="image-side">
        <div class="fox-container">
          <canvas id="fox-canvas"></canvas>
        </div>
      </div>
      <div class="chat-side">
        <div class="chat-container">
          <div class="chat-header">
            <span class="chat-title">Pixie</span>
            <button class="mode-toggle" id="modeToggle">
              <span id="modeText">Operator</span>
            </button>
            <button class="clear-btn" onclick="clearScreen()">Clear</button>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-container">
            <div class="input-wrapper">
              <input
                type="text"
                class="chat-input"
                id="messageInput"
                placeholder="Write your message..."
              />
              <button class="send-btn" id="sendButton">➤</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // 3D Fox Setup
      console.log("Initializing 3D scene...");
      const canvas = document.getElementById("fox-canvas");
      console.log("Canvas element:", canvas);
      console.log("Canvas size:", canvas.clientWidth, "x", canvas.clientHeight);

      const scene = new THREE.Scene();
      scene.background = null; // Transparent background

      const camera = new THREE.PerspectiveCamera(
        75,
        canvas.clientWidth / canvas.clientHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 1, 3);
      console.log("Camera position:", camera.position);

      const renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true,
      });
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      console.log("Renderer initialized");

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 5);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);
      console.log("Lights added");

      // Controls
      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.25;
      controls.enableZoom = true;
      controls.autoRotate = false;
      controls.autoRotateSpeed = 2;

      // Load Fox Model
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath(
        "https://www.gstatic.com/draco/versioned/decoders/1.5.6/",
      );

      const loader = new GLTFLoader();
      loader.setDRACOLoader(dracoLoader);

      let mixer;
      let foxModel = null;
      const foxBaseRotation = {
        x: (-60 * 3.14) / 360,
        y: -(2 * 3.14) / 4,
      };
      const foxLookTarget = { x: 0, y: 0 };
      const foxLookCurrent = { x: 0, y: 0 };
      let foxSpawnProgress = 0;
      const foxStartScale = 0.2;
      const foxTargetScale = 3.0;
      const foxSpawnDurationSec = 0.8;
      console.log("Starting to load fox model...");
      loader.load(
        "Fox_draco.glb",
        (gltf) => {
          console.log("Fox model loaded successfully!", gltf);
          const fox = gltf.scene;
          fox.scale.set(foxStartScale, foxStartScale, foxStartScale);
          fox.rotation.set(foxBaseRotation.x, foxBaseRotation.y, 0);
          scene.add(fox);
          foxModel = fox;
          console.log("Fox added to scene");

          if (gltf.animations && gltf.animations.length) {
            mixer = new THREE.AnimationMixer(fox);
            gltf.animations.forEach((clip) => {
              mixer.clipAction(clip).play();
            });
            console.log(`Playing ${gltf.animations.length} animations`);
          }
        },
        (progress) => {
          console.log(
            "Loading progress:",
            progress.loaded,
            "/",
            progress.total,
          );
        },
        (error) => {
          console.error("Error loading fox model:", error);
          alert("Failed to load 3D model: " + error.message);
        },
      );

      // Animation Loop
      const clock = new THREE.Clock();
      let frameCount = 0;
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        if (foxModel && foxSpawnProgress < 1) {
          foxSpawnProgress = Math.min(
            1,
            foxSpawnProgress + delta / foxSpawnDurationSec,
          );
          // Ease-out scale animation: starts quick, ends smooth.
          const eased = 1 - Math.pow(1 - foxSpawnProgress, 3);
          const scale =
            foxStartScale + (foxTargetScale - foxStartScale) * eased;
          foxModel.scale.set(scale, scale, scale);
        }
        if (foxModel) {
          // Smooth, subtle follow effect so the fox appears to look at cursor.
          foxLookCurrent.x += (foxLookTarget.x - foxLookCurrent.x) * 0.09;
          foxLookCurrent.y += (foxLookTarget.y - foxLookCurrent.y) * 0.09;
          foxModel.rotation.y = foxBaseRotation.y + foxLookCurrent.x * 0.36;
          foxModel.rotation.x = foxBaseRotation.x + foxLookCurrent.y * 0.2;
        }
        controls.update();

        renderer.render(scene, camera);

        // Log first few frames
        if (frameCount < 5) {
          console.log(`Frame ${frameCount} rendered`);
          frameCount++;
        }
      }
      console.log("Starting animation loop...");
      animate();

      // Handle Resize
      window.addEventListener("resize", () => {
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      });

      window.addEventListener("mousemove", (event) => {
        const vw = window.innerWidth || 1;
        const vh = window.innerHeight || 1;
        const nx = (event.clientX / vw) * 2 - 1;
        const ny = (event.clientY / vh) * 2 - 1;
        foxLookTarget.x = Math.max(-1, Math.min(1, nx));
        foxLookTarget.y = Math.max(-1, Math.min(1, ny));
      });

      window.addEventListener("mouseleave", () => {
        foxLookTarget.x = 0;
        foxLookTarget.y = 0;
      });

      // Chat Functionality
      const messageInput = document.getElementById("messageInput");
      const sendButton = document.getElementById("sendButton");
      const messagesContainer = document.getElementById("chatMessages");

      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        const messageDiv = document.createElement("div");
        messageDiv.className = "message user";
        messageDiv.innerHTML = `
        <div class="message-bubble">
          <button class="copy-msg-btn" onclick="copyMessage(this)" title="Copy message" aria-label="Copy message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="10" height="10" rx="2"></rect>
              <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <div class="message-text">${escapeHtml(text)}</div>
        </div>
        <div class="message-time">${new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</div>
      `;
        messagesContainer.appendChild(messageDiv);
        messageInput.value = "";
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        if (window.pywebview) {
          window.pywebview.api.send_message(text);
        }
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function renderInlineMarkdown(text) {
        let html = escapeHtml(String(text || ""));
        html = html.replace(/`([^`]+)`/g, '<code class="md-inline-code">$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        return html;
      }

      window.copyMessage = async function (button) {
        const copyIcon = `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="10" height="10" rx="2"></rect>
            <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"></path>
          </svg>
        `;
        const doneIcon = `
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        `;
        try {
          const bubble = button.closest(".message-bubble");
          if (!bubble) return;
          const textNode = bubble.querySelector(".message-text");
          const content = textNode ? textNode.innerText : bubble.innerText;
          await navigator.clipboard.writeText(content || "");
          button.classList.add("copied");
          button.innerHTML = doneIcon;
          setTimeout(() => {
            button.classList.remove("copied");
            button.innerHTML = copyIcon;
          }, 1200);
        } catch (err) {
          button.classList.remove("copied");
          button.innerHTML = copyIcon;
          setTimeout(() => {
            button.innerHTML = copyIcon;
          }, 1200);
        }
      };

      function renderStructuredText(text) {
        const raw = String(text || "").replace(/\r\n/g, "\n");
        const blocks = raw.split("```");
        const rendered = [];

        for (let i = 0; i < blocks.length; i++) {
          const block = blocks[i];

          if (i % 2 === 1) {
            const codeLines = block.split("\n");
            let lang = (codeLines.shift() || "").trim();
            let code = codeLines.join("\n");
            if (!code && lang) {
              code = lang;
              lang = "text";
            }
            if (!lang) lang = "text";

            rendered.push(
              `<div class="md-code-wrap"><div class="md-code-head">${escapeHtml(
                lang,
              )}</div><pre class="md-code"><code>${escapeHtml(code).replace(/\n$/, "")}</code></pre></div>`,
            );
            continue;
          }

          const lines = block.split("\n");
          for (const rawLine of lines) {
            const line = rawLine.trim();
            if (!line) {
              rendered.push('<div class="md-gap"></div>');
              continue;
            }

            const heading = line.match(/^(#{1,6})\s+(.*)$/);
            if (heading) {
              const level = Math.min(3, heading[1].length);
              rendered.push(
                `<div class="md-heading md-h${level}">${renderInlineMarkdown(heading[2])}</div>`,
              );
              continue;
            }

            if (/^[-=]{3,}$/.test(line)) {
              rendered.push('<div class="md-sep"></div>');
              continue;
            }

            if (/^[-*]\s+/.test(line)) {
              rendered.push(
                `<div class="md-bullet">&bull; ${renderInlineMarkdown(line.replace(/^[-*]\s+/, ""))}</div>`,
              );
              continue;
            }

            if (/^\d+\.\s+/.test(line)) {
              rendered.push(
                `<div class="md-numbered">${renderInlineMarkdown(line)}</div>`,
              );
              continue;
            }

            rendered.push(`<div class="md-p">${renderInlineMarkdown(rawLine)}</div>`);
          }
        }

        return rendered.join("");
      }

      sendButton.addEventListener("click", sendMessage);
      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      window.addAIMessage = function (text) {
        const messageDiv = document.createElement("div");
        messageDiv.className = "message assistant";
        messageDiv.innerHTML = `
        <div class="message-bubble">
          <button class="copy-msg-btn" onclick="copyMessage(this)" title="Copy message" aria-label="Copy message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="10" height="10" rx="2"></rect>
              <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <div class="message-text">${renderStructuredText(text)}</div>
        </div>
        <div class="message-time">${new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</div>
      `;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      };

      function clearScreen() {
        messagesContainer.innerHTML = "";
      }

      // No-op logger kept for compatibility with old calls.
      window.addTerminalLog = function (message, type = "info") {
        return;
      };

      function toggleMode() {
        if (window.pywebview) {
          window.pywebview.api.toggle_operator_mode().then((result) => {
            const modeText = document.getElementById("modeText");
            if (result.operator_mode) {
              modeText.textContent = "Operator";
            } else {
              modeText.textContent = "Chat";
            }
          });
        }
      }

      document
        .getElementById("modeToggle")
        .addEventListener("click", toggleMode);
    </script>
  </body>
</html>
