<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orange Glass Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --orange-50: #fff7ed;
        --orange-100: #ffedd5;
        --orange-200: #fed7aa;
        --orange-300: #fdba74;
        --orange-400: #fb923c;
        --orange-500: #f97316;
        --orange-600: #ea580c;
        --orange-700: #c2410c;
        --orange-800: #9a3412;
        --orange-900: #7c2d12;
        --peach: #ffb090;
        --sunset: #ff6b35;
        --amber: #ffa500;
        --coral: #ff7f50;
      }
      body {
        font-family: "Outfit", sans-serif;
        background: linear-gradient(
          135deg,
          rgba(255, 180, 120, 0.9) 0%,
          rgba(255, 140, 140, 0.9) 25%,
          rgba(255, 190, 150, 0.9) 50%,
          rgba(255, 170, 100, 0.9) 75%,
          rgba(255, 145, 100, 0.9) 100%
        );
        min-height: 100vh;
        display: flex;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(255, 154, 86, 0.4),
          transparent
        );
        border-radius: 50%;
        top: -200px;
        left: -200px;
        animation: float 20s ease-in-out infinite;
        pointer-events: none;
      }
      body::after {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(255, 112, 67, 0.3),
          transparent
        );
        border-radius: 50%;
        bottom: -250px;
        right: -250px;
        animation: float 25s ease-in-out infinite reverse;
        pointer-events: none;
      }
      .main-container::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(255, 154, 86, 0.4),
          transparent
        );
        border-radius: 50%;
        top: -200px;
        left: -200px;
        animation: float 20s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(255, 112, 67, 0.3),
          transparent
        );
        border-radius: 50%;
        bottom: -250px;
        right: -250px;
        animation: float 25s ease-in-out infinite reverse;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(50px, 50px) scale(1.1);
        }
      }
      .main-container {
        display: flex;
        width: 100%;
        height: 100vh;
        position: relative;
        z-index: 1;
      }
      .image-side {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        padding-right: 20px;
        position: relative;
        max-width: calc(100% - 520px);
      }
      .image-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        animation: idleFloat 6s ease-in-out infinite;
      }
      @keyframes idleFloat {
        0%,
        100% {
          transform: translateY(0) translateX(0) scale(1);
        }
        25% {
          transform: translateY(-15px) translateX(10px) scale(1.01);
        }
        50% {
          transform: translateY(-20px) translateX(-5px) scale(1.02);
        }
        75% {
          transform: translateY(-10px) translateX(5px) scale(1.01);
        }
      }
      .image-display {
        max-width: 90%;
        max-height: 90%;
        border-radius: 0;
        overflow: visible;
        box-shadow: none;
        border: none;
        background: transparent;
        backdrop-filter: none;
        position: relative;
      }
      .image-display::before {
        display: none;
      }
      .image-display img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .chat-side {
        width: 480px;
        padding: 0.37cm 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .chat-container {
        width: 100%;
        height: calc(100vh - 0.74cm);
        max-height: calc(100vh - 0.74cm);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow:
          0 8px 32px rgba(255, 107, 53, 0.3),
          0 1px 4px rgba(0, 0, 0, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .chat-header {
        padding: 24px 20px 20px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(255, 255, 255, 0.05) 100%
        );
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .back-button {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .back-button:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateX(-3px);
      }
      .back-button svg {
        width: 20px;
        height: 20px;
        stroke: rgba(255, 255, 255, 0.95);
        stroke-width: 2.5;
      }
      .chat-title {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        letter-spacing: -0.3px;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .chat-messages::-webkit-scrollbar {
        width: 6px;
      }
      .chat-messages::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      .message {
        animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        animation-fill-mode: both;
      }
      @keyframes messageSlide {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .message.user {
        align-self: flex-end;
        max-width: 80%;
      }
      .message.assistant {
        align-self: flex-start;
        max-width: 85%;
      }
      .message-bubble {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        padding: 14px 18px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 16px rgba(255, 107, 53, 0.15);
        margin-bottom: 6px;
      }
      .message.user .message-bubble {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px 20px 4px 20px;
      }
      .message.assistant .message-bubble {
        border-radius: 20px 20px 20px 4px;
      }
      .message-text {
        color: rgba(255, 255, 255, 0.95);
        font-size: 15px;
        line-height: 1.5;
        font-weight: 400;
      }
      .message-time {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        font-weight: 300;
        margin-top: 4px;
      }
      .chat-input-container {
        padding: 16px 20px 24px;
        background: linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(255, 255, 255, 0.05) 100%
        );
        border-top: 1px solid rgba(255, 255, 255, 0.15);
      }
      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 4px 6px 4px 20px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        transition: all 0.3s ease;
      }
      .input-wrapper:focus-within {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
      }
      .add-button {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .add-button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: rotate(90deg);
      }
      .add-button svg {
        width: 20px;
        height: 20px;
        stroke: white;
        stroke-width: 2.5;
      }
      .message-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: rgba(255, 255, 255, 0.95);
        font-size: 15px;
        font-family: "Outfit", sans-serif;
        font-weight: 400;
        padding: 10px 0;
      }
      .message-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .send-button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange-500), var(--sunset));
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 16px rgba(255, 107, 53, 0.4);
      }
      .send-button:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 24px rgba(255, 107, 53, 0.5);
      }
      .send-button:active {
        transform: scale(0.95);
      }
      .send-button svg {
        width: 20px;
        height: 20px;
        stroke: white;
        stroke-width: 2.5;
        fill: none;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="image-side">
        <div class="image-container">
          <div class="image-display" id="imageDisplay">
            <img id="foxImage" alt="Fox" style="display: none" />
          </div>
        </div>
      </div>
      <div class="chat-side">
        <div class="chat-container">
          <div class="chat-header">
            <button class="back-button">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M15 18l-6-6 6-6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <h1 class="chat-title">Pixie AI</h1>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-container">
            <div class="input-wrapper">
              <button class="add-button">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke-linecap="round" />
                </svg>
              </button>
              <input
                type="text"
                class="message-input"
                id="messageInput"
                placeholder="Write your message..."
              />
              <button class="send-button" id="sendButton">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const messageInput = document.getElementById("messageInput");
      const sendButton = document.getElementById("sendButton");
      const messagesContainer = document.getElementById("chatMessages");

      window.onload = function () {
        const foxImg = document.getElementById("foxImage");
        if (foxImg && (!foxImg.src || foxImg.src === window.location.href)) {
          foxImg.src =
            "C:\\Users\\mizin\\pixie\\AI-Assistant-for-Computer\\fox.png";
          foxImg.style.display = "block";
        } else if (foxImg && foxImg.src.startsWith("data:")) {
          foxImg.style.display = "block";
        }
      };

      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        const messageDiv = document.createElement("div");
        messageDiv.className = "message user";
        messageDiv.innerHTML = `
<div class="message-bubble">
<div class="message-text">${text}</div>
</div>
<div class="message-time">${new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</div>
`;
        messagesContainer.appendChild(messageDiv);
        messageInput.value = "";
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        if (window.pywebview) {
          window.pywebview.api.send_message(text);
        }
      }

      sendButton.addEventListener("click", sendMessage);
      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      window.addAIMessage = function (text) {
        const messageDiv = document.createElement("div");
        messageDiv.className = "message assistant";
        messageDiv.innerHTML = `
<div class="message-bubble">
<div class="message-text">${text}</div>
</div>
<div class="message-time">${new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</div>
`;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      };
    </script>
  </body>
</html>
